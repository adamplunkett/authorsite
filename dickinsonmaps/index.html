<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ED Reference Maps</title>
<style>
  :root{
    --bg:#fbfaf7; --panel:#fff; --ink:#211c16; --muted:#857a6c; --line:#e8e2d6;
    --accent:#5a4a8a; --hh:96px; --specleft:400px; --pad:22px; --gutter:58px; --axis:26px; --legendh:40px; --lanelabel:120px; --prw:224px;
    --band:#f2eee4; --divider:#9a7a5a;
    --m-strong:#a3302a; --m-saturation:#7c3a8e; --m-plausible:#3d77a0; --m-other:#9a9488;
  }
  *{box-sizing:border-box}
  body{margin:0;font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
       background:var(--bg);color:var(--ink)}
  header{padding:8px 22px 7px;border-bottom:1px solid var(--line);background:var(--panel);position:sticky;top:0;z-index:30}
  h1{margin:0;font:500 18px/1.1 Georgia,'Times New Roman',serif;letter-spacing:.004em;color:var(--ink);display:inline}
  h1 .rm{color:var(--muted);font-weight:400;font-style:italic;font-size:14.5px}
  .sub{color:#6b6257;font:italic 11px/1.3 Georgia,'Times New Roman',serif;margin-top:1px;max-width:90ch;display:inline-block}
  .stats{margin-top:4px;font-size:10.5px;color:var(--muted);display:flex;gap:7px;flex-wrap:wrap;
         font-variant-numeric:tabular-nums;letter-spacing:.01em;align-items:center}
  .stats .dot{color:#cdc4b4}
  .stats b{color:var(--ink);font-weight:600}
  .controls{margin-top:6px;display:flex;gap:7px;flex-wrap:wrap;align-items:center}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .seg button{font:inherit;font-size:11.5px;padding:3px 11px;border:0;background:#fff;cursor:pointer;color:var(--ink)}
  .seg button.active{background:var(--accent);color:#fff}
  .toggle{font-size:11.5px;padding:2.5px 9px;border:1px solid var(--line);border-radius:20px;cursor:pointer;
          user-select:none;background:#fff;display:inline-flex;gap:7px;align-items:center}
  .toggle:not(.off){background:#f1edf8;border-color:#cabbe4}   /* ON = clearly tinted/selected */
  .toggle.off{opacity:.5;background:#fff;border-color:var(--line)}
  .toggle .mk{width:13px;height:13px;display:inline-flex}
  .toggle.src{border-style:dashed}
  .srcsep{width:1px;height:18px;background:var(--line);margin:0 2px}
  .mark.cg, .pt.cg{outline:1.4px dotted #8a8073;outline-offset:1.5px;border-radius:50%}
  .mark.con, .pt.con{box-shadow:0 0 0 2px #d98a2b;border-radius:50%}
  .toggle#conbtn{border-color:#e3c79a}
  input[type=search]{font:inherit;font-size:13px;padding:5px 10px;border:1px solid var(--line);border-radius:7px;width:185px;background:#fff}
  .facet{font:inherit;font-size:12px;padding:4px 6px;border:1px solid var(--line);border-radius:7px;background:#fff;cursor:pointer}
  body.m-kjv #ruler{display:none} body.m-kjv #scroll{display:none}
  body.m-poem #plane{display:none}
  /* top KJV ruler (poem mode) — aligned to the spine column */
  #ruler{position:sticky;top:var(--hh);z-index:8;height:44px;background:var(--panel);border-bottom:1px solid var(--line)}
  #ruler .rulhd{position:absolute;left:26px;top:0;bottom:0;width:calc(var(--specleft) - 40px);display:flex;align-items:center;
                font-size:10px;letter-spacing:.06em;color:var(--muted);text-transform:uppercase}
  #rtrack{position:absolute;left:var(--specleft);right:var(--pad);top:0;bottom:0}
  .rulcap{position:absolute;top:6px;font-size:9px;color:var(--muted);letter-spacing:.09em}
  .rultick{position:absolute;bottom:0;width:1px;height:6px;background:#c9bda6}
  .rullbl{position:absolute;bottom:6px;transform:translateX(-50%);font-size:9.5px;color:#8a8073;white-space:nowrap;cursor:pointer}
  .rullbl:hover{color:var(--accent)}
  .ruldiv{position:absolute;top:0;bottom:0;width:1px;background:var(--divider);opacity:.7}
  .ruldiv span{position:absolute;top:1px;left:3px;font-size:8px;color:var(--divider);letter-spacing:.1em;font-weight:600}
  /* poem-mode rows: name column + inline spine on ONE line */
  #scroll{position:relative;padding-bottom:60px}
  #grid{position:absolute;inset:0;pointer-events:none;z-index:0}
  .gband{position:absolute;top:0;bottom:0;background:var(--band);opacity:.6}
  .gline{position:absolute;top:0;bottom:0;width:1px;background:#dccfb6}
  .gdiv{position:absolute;top:0;bottom:0;width:1px;background:var(--divider);opacity:.45}
  #rows{position:relative;z-index:1}
  .poemrow{position:absolute;left:0;right:0;height:44px;border-bottom:1px solid var(--line);cursor:pointer}
  .poemrow:hover{background:#fcfaf5}
  .prname{position:absolute;left:26px;width:calc(var(--specleft) - 40px);top:50%;transform:translateY(-50%);
          display:flex;align-items:baseline;gap:9px;overflow:hidden;white-space:nowrap}
  .prf{color:var(--accent);font-weight:600;font-size:12.5px;font-variant-numeric:tabular-nums;flex:none}
  .prfl{flex:1;min-width:0;font-weight:500;overflow:hidden;text-overflow:ellipsis}
  .pryr{color:var(--muted);font-size:11.5px;flex:none;font-variant-numeric:tabular-nums}
  .hspine{position:absolute;left:var(--specleft);right:var(--pad);top:50%;transform:translateY(-50%);height:22px}
  .hbase{position:absolute;left:0;right:0;top:50%;height:1px;background:var(--line)}
  .mark{position:absolute;top:50%;transform:translate(-50%,-50%);cursor:pointer;transition:transform .08s}
  .mark:hover{transform:translate(-50%,-50%) scale(1.45);z-index:3}
  .mark.flash{outline:2px solid var(--accent);outline-offset:2px;border-radius:50%}
  /* scripture-mode: scrollable, drill-down lanes (book -> chapter -> verse) */
  #plane{position:fixed;left:0;right:0;top:var(--hh);bottom:0;background:var(--bg);display:flex;flex-direction:column}
  #planetop{flex:none;background:var(--panel);border-bottom:1px solid var(--line)}
  #crumb{padding:8px 16px 3px;font-size:13px;color:var(--ink)}
  #crumb a{color:var(--accent);cursor:pointer;text-decoration:none}
  #crumb a:hover{text-decoration:underline}
  #crumb .sep{color:var(--muted);margin:0 7px}
  #planelegend{display:flex;align-items:center;gap:18px;padding:3px 16px 7px;font-size:11.5px;color:var(--muted);flex-wrap:wrap}
  #planelegend b{color:var(--ink);font-weight:600}
  .lgbar{display:inline-block;width:110px;height:9px;border-radius:5px;vertical-align:middle;margin:0 7px;
    background:linear-gradient(to right, rgb(216,164,65), rgb(150,108,92), rgb(59,42,107))}
  .lgtier svg{vertical-align:middle;margin:0 1px}
  #timehead{position:relative;height:19px;border-top:1px solid var(--line)}
  #timeruler{position:absolute;left:var(--lanelabel);right:18px;top:0;bottom:0}
  #lanes{flex:1;overflow-y:auto;overflow-x:hidden;position:relative}
  #lanesgrid{position:absolute;left:var(--lanelabel);right:18px;top:0;bottom:0;pointer-events:none;z-index:0}
  #lanerows{position:relative;z-index:1}
  .lane{position:relative;display:flex;border-bottom:1px solid #f0ebe1;min-height:48px}
  .lanelabel{width:var(--lanelabel);flex:none;padding:6px 9px;font-size:12.5px;border-right:1px solid var(--line);
    display:flex;flex-direction:column;justify-content:center;background:var(--panel)}
  .lanelabel.drill{cursor:pointer}
  .lanelabel.drill .lm{color:var(--accent);font-weight:600}
  .lanelabel.drill:hover{background:#f2eef7}
  .lanelabel .lm{font-weight:500}
  .lanelabel .lc{font-size:10px;color:var(--muted);margin-top:1px}
  .lanestrip{position:relative;flex:1;margin-right:18px}
  .vline{position:absolute;top:0;bottom:0;width:1px;background:#e6dfd0}
  .vband{position:absolute;top:0;bottom:0;background:#ece3d2;opacity:.4}
  .tlab{position:absolute;top:3px;font-size:10px;color:var(--muted);transform:translateX(-50%);font-variant-numeric:tabular-nums}
  .pt{position:absolute;transform:translate(-50%,-50%);cursor:pointer;transition:opacity .1s}
  .pt:hover{z-index:6}
  .pt.flash{outline:2px solid var(--accent);outline-offset:2px;border-radius:50%}
  .heatcell{position:absolute;top:6px;bottom:6px;border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .heatcell:hover{outline:1.5px solid var(--accent);outline-offset:-1px}
  .hcn{font-size:9.5px;color:#2a2118;font-weight:700}
  .scursor{position:absolute;top:0;bottom:0;width:1px;background:var(--accent);opacity:.45;pointer-events:none}
  #lanerows.foc .pt{opacity:.16}
  #lanerows.foc .pt.hi{opacity:1}
  /* study view as a wide right panel (the map stays visible & homes in) */
  #study{position:fixed;right:0;top:var(--hh);bottom:0;width:560px;max-width:94vw;background:var(--panel);
    border-left:1px solid var(--line);box-shadow:-10px 0 30px rgba(0,0,0,.10);overflow:auto;z-index:55;
    transform:translateX(100%);transition:transform .18s ease}
  #study.open{transform:translateX(0)}
  .sbar{position:sticky;top:0;background:var(--panel);border-bottom:1px solid var(--line);padding:9px 20px;z-index:2}
  .sback{color:var(--accent);cursor:pointer;font-size:13px;text-decoration:none} .sback:hover{text-decoration:underline}
  .scol{padding:16px 22px 70px}
  .poemrow.rowsel{background:#f1edf8;box-shadow:inset 3px 0 0 var(--accent)}
  .lane.lanesel{background:#f3eff8;box-shadow:inset 3px 0 0 var(--accent)}
  .scol h2{font:500 23px/1.2 Georgia,'Times New Roman',serif;margin:0;color:var(--ink)}
  .smeta{color:var(--muted);font-size:12.5px;margin-top:3px}
  .twocol{display:grid;grid-template-columns:1fr;gap:0}
  .poemtext.big{font:15px/1.6 Georgia,'Times New Roman',serif;margin:14px 0 4px}
  .sech{border:1px solid var(--line);border-radius:10px;padding:11px 14px 6px;margin:10px 0;background:var(--panel)}
  .sech.click{cursor:pointer} .sech.click:hover{background:#f7f3ec}
  .sech.econ{border-color:#e3c79a;box-shadow:0 0 0 1px #e3c79a}
  .sechh{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-bottom:6px}
  .slink{color:var(--accent);cursor:pointer;font-weight:600} .slink:hover{text-decoration:underline}
  .passage.interlin{border:0;background:none}
  .ivs{border-bottom:1px solid #f0ebe1;padding:2px 0 5px}
  .ivs .pv.tgt{background:none;border:0;color:var(--ink);padding:5px 2px 1px}
  .vechoes{padding:1px 0 3px 30px;display:flex;flex-direction:column;gap:1px}
  .vlink{font-size:11.5px;color:#7a7065;cursor:pointer;display:flex;align-items:center;gap:6px;text-decoration:none;line-height:1.45}
  .vlink:hover{color:var(--accent)}
  .vd{width:7px;height:7px;border-radius:50%;flex:none}
  .vfl{font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .vff{color:#a89e8e;font-variant-numeric:tabular-nums;flex:none}
  .nsub{font-weight:400;font-style:italic;color:var(--muted);font-size:11.5px}
  .kindred{display:flex;flex-direction:column;gap:1px;margin:2px 0 4px}
  .klink{font-size:12px;color:#5a5247;cursor:pointer;display:flex;align-items:baseline;gap:7px;text-decoration:none;line-height:1.5;padding:1.5px 4px;border-radius:5px}
  .klink:hover{background:#f1edf8;color:var(--accent)}
  .kfl{font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .kff{color:#a89e8e;font-variant-numeric:tabular-nums;flex:none}
  .kvia{margin-left:auto;flex:none;font-size:10px;color:#8a8073;background:#f3efe7;border-radius:4px;padding:0 6px;white-space:nowrap}
  .mr{margin:3px 0 6px}
  .mrow{display:flex;align-items:center;gap:9px;padding:2px 4px;border-radius:5px;font-size:12px}
  .mrow:hover{background:#f1edf8}
  .mlbl{flex:none;width:128px;color:#4a443a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .mtrack{flex:1;height:9px;background:#efe9df;border-radius:5px;overflow:hidden}
  .mbar{display:block;height:100%;background:linear-gradient(90deg,#b7a3d8,#8a74b8);border-radius:5px}
  .mn{flex:none;width:30px;text-align:right;color:#8a8073;font-variant-numeric:tabular-nums;font-size:11px}
  .spines{display:flex;flex-wrap:wrap;align-items:baseline;gap:3px 3px;margin:5px 0 1px}
  .spinelbl{font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-right:3px}
  .spine{font-size:11.5px;color:#4a443c;cursor:pointer;text-decoration:none;border:1px solid var(--line);border-radius:12px;padding:1.5px 8px;white-space:nowrap;background:#fff}
  .spine:hover{border-color:var(--accent);color:var(--accent)}
  .spine.scrip{border-color:#cabbe4;background:#f5f1fa}
  .spine b{color:#a89e8e;font-weight:600;font-variant-numeric:tabular-nums}
  .wtitle{font-weight:600;color:#2f3a44}
  .wn{color:#a89e8e;font-size:11px;font-variant-numeric:tabular-nums}
  .sbar{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .stoggle{font-size:12px;color:var(--muted);cursor:pointer;border:1px solid var(--line);border-radius:6px;padding:2px 9px;white-space:nowrap}
  .stoggle:hover{border-color:var(--accent);color:var(--accent)}
  .interlin.hidep .vechoes{display:none}
  .xref{margin:2px 0}
  .xrefg{font-size:11px;color:#857a6c;padding:0 4px 3px 12px;line-height:1.45;font-style:italic}
  .spine.words{border-color:#cdbfa0;background:#faf6ee}
  .spine.work2d{border-color:#bcd0c8;background:#f2f7f5}
  .spine.work2d:hover{border-color:#3f8a72;color:#2f6a56}
  #litspine{position:fixed;left:0;right:0;bottom:0;top:var(--hh);background:#fbfaf7;z-index:50;display:none;overflow:auto}
  #litspine.open{display:block}
  .sphd{display:flex;justify-content:space-between;align-items:baseline;gap:12px;padding:9px 16px;border-bottom:1px solid var(--line);background:#fff;position:sticky;top:0;z-index:2}
  .sphd b{font:500 17px Georgia,serif}
  .spsub{font-size:12px;color:var(--muted);font-style:italic;margin-left:8px}
  .spclose{font-size:12.5px;color:var(--accent);cursor:pointer;white-space:nowrap}
  .spsvg{display:block}
  .spsvg .sd{cursor:pointer} .spsvg .sd:hover{stroke:#241f18;stroke-width:1.4}
  .slbl{font-size:10px;fill:#8a8073;text-transform:uppercase;letter-spacing:.05em}
  .ytk{font-size:10px;fill:#a89e8e;text-anchor:middle}
  .axl{font-size:10.5px;fill:#5a5247;text-anchor:middle;font-weight:600}
  .axt{cursor:pointer} text.axt:hover{fill:var(--accent);text-decoration:underline}
  span.wstk.axt{cursor:pointer} span.wstk.axt:hover{color:var(--accent);text-decoration:underline}
  .spstrip{fill:transparent} .spguide,.sphov{pointer-events:none}
  .sphov{font:600 11px Georgia,serif;fill:var(--accent);text-anchor:middle}
  .spcrumb{color:var(--accent);cursor:pointer;text-decoration:none;font-weight:500} .spcrumb:hover{text-decoration:underline}
  /* By-work-as-poems (lit spine, By poem view) */
  .wsruler{display:flex;align-items:center;height:24px;border-bottom:1px solid var(--line);background:#fbfaf7;position:sticky;top:0;z-index:2}
  .wsrname{width:var(--prw);flex:none;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding-left:14px;box-sizing:border-box}
  .wsaxis{position:relative;flex:1;height:100%;margin-right:8px}
  .wstk{position:absolute;top:6px;transform:translateX(-50%);font-size:10px;color:#8a8073;white-space:nowrap}
  .wsrows{position:relative}
  .wsband{position:absolute;top:0;bottom:0;width:1px;background:#efe9dd;pointer-events:none} .wsband.nl{background:#e6ddcc}
  .wsrow{display:flex;align-items:center;height:27px;border-bottom:1px solid #f4efe6;position:relative;cursor:pointer}
  .wsrow:hover{background:#faf7f1}
  .wsrow .prname{position:static;transform:none;top:auto;left:auto;width:var(--prw);flex:none;display:flex;gap:7px;align-items:baseline;padding-left:14px;box-sizing:border-box;overflow:hidden;white-space:nowrap}
  .wsspine{position:relative;flex:1;height:100%;margin-right:8px}
  .wsbase{position:absolute;top:50%;left:0;right:0;height:1px;background:#efe9dd}
  .wsm{position:absolute;top:50%;transform:translate(-50%,-50%);width:9px;height:9px;border-radius:50%;cursor:pointer;box-shadow:0 0 0 2px #fbfaf7}
  .wsm:hover{outline:1.5px solid #241f18}
  .wsrow.lst{height:auto;min-height:28px;padding:5px 16px;align-items:baseline;gap:14px}
  .lstname{flex:none;width:300px;display:flex;gap:7px;align-items:baseline;overflow:hidden;white-space:nowrap}
  .lstname .tdot{width:8px;height:8px;border-radius:50%;flex:none;align-self:center}
  .lstg{flex:1;font-size:12px;color:#6a6256;line-height:1.5;overflow:hidden}
  .lexsearch{font:15px Georgia,serif;width:100%;box-sizing:border-box;padding:8px 12px;margin:4px 0 6px;border:1px solid #d8d2c6;border-radius:8px;background:#fff}
  .lexsearch:focus{outline:none;border-color:var(--accent)}
  .lexcloud{display:flex;flex-wrap:wrap;gap:5px 6px;margin:3px 0 8px}
  .lexw{font-size:12.5px;color:#4a443c;cursor:pointer;text-decoration:none;border-bottom:1px dotted #cabbe4;line-height:1.7}
  .lexw:hover{color:var(--accent)}
  .lexw b{color:#b3a895;font-weight:500;font-size:10.5px;font-variant-numeric:tabular-nums}
  .lexw.seed{color:#5a4a8a;font-weight:600}
  .conclist{margin:2px 0 4px}
  .conc{margin:7px 0;padding-left:10px;border-left:2px solid #ece6da}
  .conctitle{display:flex;gap:7px;align-items:baseline;cursor:pointer;text-decoration:none;font-size:12px}
  .conctitle:hover .vfl{color:var(--accent)}
  .concline{font-size:13px;color:#33302a;line-height:1.5;padding:1px 0 1px 4px}
  .concline mark{background:#fbeec0;color:inherit;padding:0 1px;border-radius:2px}
  .interlin.hidep .ivs{margin-bottom:2px}
  .littbl{margin:3px 0 6px}
  .lit{border-left:3px solid #6fae9b;background:#f4f8f6;border-radius:0 7px 7px 0;padding:6px 11px;margin:5px 0}
  .lith{display:flex;align-items:center;gap:7px;font-size:12.5px;flex-wrap:wrap}
  .litau{color:#2f4a40}
  .litwk{font-style:italic;color:#4a5566}
  .tdot{width:8px;height:8px;border-radius:50%;flex:none}
  .litg{font-size:11.5px;color:#6a6256;margin-top:3px;line-height:1.46}
  #tip{position:fixed;z-index:80;background:#241f18;color:#fff;font-size:11.5px;line-height:1.4;padding:6px 10px;
       border-radius:7px;pointer-events:none;display:none;max-width:380px;box-shadow:0 4px 14px rgba(0,0,0,.22)}
  #tip .t1{font-weight:600;margin-bottom:2px} #tip .t2{color:#d8cdbb;font-size:11px}
  #tip .ti{white-space:nowrap;overflow:hidden;text-overflow:ellipsis} #tip .ti b{color:#fff;font-weight:600}
  #tip .ti i{color:#cbbfae} #tip .tf{color:#9a8f7e} #tip .tmore{color:#9a8f7e;font-style:italic;margin-top:1px}
  /* drawer */
  #drawer{position:fixed;top:0;right:0;width:460px;max-width:93vw;height:100vh;background:var(--panel);
          border-left:1px solid var(--line);box-shadow:-8px 0 28px rgba(0,0,0,.10);z-index:50;
          transform:translateX(100%);transition:transform .18s ease;overflow:auto;padding:18px 22px 70px}
  #drawer.open{transform:translateX(0)}
  #scrim{position:fixed;inset:0;background:rgba(20,16,10,.18);z-index:49;opacity:0;pointer-events:none;transition:opacity .18s}
  #scrim.open{opacity:1;pointer-events:auto}
  #drawer .x{position:absolute;top:11px;right:14px;cursor:pointer;color:var(--muted);font-size:22px;line-height:1}
  #drawer h3{margin:2px 40px 3px 0;font-size:16px}
  .nlabel{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:16px 0 5px;display:flex;align-items:center;gap:7px}
  .nlabel::after{content:'';flex:1;height:1px;background:var(--line)}
  .passage{border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .pv{padding:6px 12px;font-size:13.5px;line-height:1.5;border-bottom:1px solid #f0ebe1;color:#6d6457}
  .pv:last-child{border-bottom:0}
  .pv.tgt{background:#f6f0e2;color:var(--ink);font-weight:500}
  .pv .vn{color:var(--muted);font-size:11px;font-variant-numeric:tabular-nums;margin-right:7px}
  .poemtext{white-space:pre-wrap;font:14px/1.55 Georgia,'Times New Roman',serif;color:#2c2820;
            background:#faf7f0;border:1px solid var(--line);border-radius:9px;padding:12px 15px}
  .note{font-size:13.5px;line-height:1.62;color:#33302a}

  .echo:hover{background:#f7f3ec}
  .echo .drill{float:right;color:var(--muted);font-size:12px}
  .erow{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap}
  .elink{font-size:13.5px;color:var(--accent);font-weight:600}
  .emuted{font-size:11.5px;color:var(--muted)}
  .srctag{font-size:9.5px;text-transform:uppercase;letter-spacing:.04em;color:#6b6257;border:1px solid var(--line);border-radius:4px;padding:0 5px}
  .contag{font-size:9.5px;color:#9a5a12;background:#fbf0dc;border:1px solid #e3c79a;border-radius:4px;padding:0 5px}
  .echo.econ{border-color:#e3c79a;box-shadow:0 0 0 1px #e3c79a}
  .enote{font-size:12.5px;line-height:1.55;color:#4a443c;margin-top:6px}
  .moreech{font-size:12.5px;color:var(--accent);cursor:pointer;margin:11px 2px;user-select:none}
  .moreech:hover{text-decoration:underline}
  .backlink{font-size:12.5px;color:var(--accent);cursor:pointer;margin:0 0 9px;display:inline-block}
  .backlink:hover{text-decoration:underline}
  a.anchor{color:var(--accent);font-size:12.5px;text-decoration:none}
  a.anchor:hover{text-decoration:underline}
  /* ---- mobile (≤760px) — additive only; desktop UI is untouched above ---- */
  @media (max-width:760px){
    :root{--specleft:150px;--pad:9px;--gutter:26px;--lanelabel:78px;--prw:128px}
    header{padding:7px 12px 6px}

    /* one swipeable row instead of a tall wrapped tower */

    .spines::-webkit-scrollbar,.controls::-webkit-scrollbar{display:none}

    .stats{font-size:10px;gap:5px}
    .spine{padding:3px 9px;font-size:12px} .toggle{padding:4px 10px;font-size:12px}
    /* panels take the whole screen */
    #study{width:100vw;max-width:100vw} #drawer{width:100vw;max-width:100vw}
    .scol{padding:14px 16px 60px}
    /* By-poem (KJV + lit spines): tighter name column, bigger touch marks */
    .prname{font-size:12px} .prfl{font-size:12px}
    .wsruler .wsrname,.wsrow .prname{padding-left:10px}
    .wsrow .prname .prfl{font-size:11.5px}
    .lstname{width:auto;flex:1}
    .wsm{width:12px;height:12px} .mark svg{transform:scale(1.25)}

  }
</style>
</head>
<body class="m-poem">
<header>
  <h1>Emily Dickinson<span class="rm"> — mapping the echoes in her writing</span></h1>
  <div class="sub" id="sub"></div>
  <div class="spines" id="spines"></div>
  <div class="stats" id="stats"></div>
  <div class="controls" id="controls"></div>
</header>
<div id="ruler"><div class="rulhd">Poem</div><div id="rtrack"></div></div>
<div id="scroll"><div id="grid"></div><div id="rows"></div></div>
<div id="plane">
  <div id="planetop">
    <div id="crumb"></div>
    <div id="planelegend"></div>
    <div id="timehead"><div id="timeruler"></div></div>
  </div>
  <div id="lanes"><div id="lanesgrid"></div><div id="lanerows"></div></div>
</div>
<div id="tip"></div>
<div id="scrim" onclick="closeDrawer()"></div>
<div id="drawer"><span class="x" onclick="closeDrawer()">×</span><div id="dbody"></div></div>
<div id="study"></div>
<div id="litspine"></div>

<script id="app" type="text/plain">
const D=window.ED_DATA, TOTAL=D.kjv_total, BOOKS=D.kjv_books;
const BMAP={}; BOOKS.forEach(b=>BMAP[b.key]=b);
const NT_FIRST=BOOKS.find(b=>b.name==='Matthew');
const FMAX=Math.max(...D.poems.map(p=>+p.franklin.slice(1)));
const YMIN=1850, YMAX=1886;
const css=v=>getComputedStyle(document.documentElement).getPropertyValue(v).trim();
const slug=s=>s.replace(/[^a-zA-Z0-9]/g,'_');
const yPct=seq=>((seq-0.5)/TOTAL)*100;
// By-poem x-axis domain: whole KJV, or just the faceted book (chapter/verse scale)
function xDomain(){ if(mode==='poem'&&facetBook){const b=BMAP[facetBook];return [b.start-0.5,b.end+0.5];} return [0.5,TOTAL+0.5]; }
function xpct(seq){const d=xDomain();return ((seq-d[0])/(d[1]-d[0]))*100;}
let mode='poem', xaxis='year', visTiers=new Set(['strong','saturation']), showPlausible=true, showOther=false, query='';
let facetBook=null, facetDecade=null, heatOn=true, contestedOnly=false;
const HEAT_MIN=12;   // a lane with more refs than this renders as time-binned heat cells
// initial state from URL (?view=poem|kjv & x=year|franklin & tiers=strong,plausible,…) — deep-linkable + screenshot-able
{const u=new URLSearchParams(location.search);
 if(u.get('view')==='kjv'||u.get('view')==='poem')mode=u.get('view');
 if(u.get('x')==='franklin'||u.get('x')==='year')xaxis=u.get('x');
 if(u.has('tiers')){const ts=new Set(u.get('tiers').split(','));visTiers=new Set([...ts].filter(t=>t==='strong'||t==='saturation'));
   showPlausible=ts.has('plausible');showOther=['set-aside','register','commonplace','rejected','other'].some(t=>ts.has(t));}}

function markFill(t){return css(t==='strong'?'--m-strong':t==='saturation'?'--m-saturation':t==='plausible'?'--m-plausible':'--m-other');}
function tierVisible(t){if(t==='strong'||t==='saturation')return visTiers.has(t);if(t==='plausible')return showPlausible;return showOther;}
const tierRank={strong:0,saturation:1,plausible:2,commonplace:3,register:4,'set-aside':5,rejected:6};
let srcVis=new Set(['ours','chatgpt','scholarship']);
function srcFamily(ab){return !ab?'other':ab.indexOf('ed-notes')===0?'ours':ab==='chatgpt-notes'?'chatgpt':'scholarship';}
const SRC_LBL={ours:'Claude chats',chatgpt:'ChatGPT chats',scholarship:'Scholarship'};
const SRC_EDGES={ours:0,chatgpt:0,scholarship:0,other:0}; D.poems.forEach(p=>p.edges.forEach(e=>SRC_EDGES[srcFamily(e.asserted_by)]++));
// tier marks: By-poem colors by tier; the plane colors by YEAR (col passed in) and lets shape carry tier
function markSVG(t,col){const f=col||markFill(t);
  if(t==='saturation')return `<svg width="14" height="14"><circle cx="7" cy="7" r="5.2" fill="none" stroke="${f}" stroke-width="2.4"/></svg>`;
  const r=t==='strong'?6:t==='plausible'?4.4:3.4, d=Math.ceil(r*2+2), op=t==='strong'?1:t==='plausible'?.92:.62;
  return `<svg width="${d}" height="${d}"><circle cx="${d/2}" cy="${d/2}" r="${r}" fill="${f}" opacity="${op}"/></svg>`;}
function lerp(a,b,t){return a.map((v,i)=>Math.round(v+(b[i]-v)*t));}
function eraColor(year){if(!year)return '#b9b2a6';const t=Math.min(1,Math.max(0,(year-YMIN)/(YMAX-YMIN)));
  const c=lerp([216,164,65],[59,42,107],t);return `rgb(${c[0]},${c[1]},${c[2]})`;}

function loci(p){
  const NP=D.notes_pool, rs=s=>s==null?null:NP[s];   // resolve pooled note/gloss indices -> text
  const g={}; p.edges.forEach(e0=>{const e={...e0,note:rs(e0.note),gloss:rs(e0.gloss)};
    const k=(e.note||e.gloss||'')+'|'+e.book;(g[k]=g[k]||[]).push(e);});
  const runs=[]; Object.values(g).forEach(es=>{es.sort((a,b)=>a.seq-b.seq);let r=[es[0]];
    for(let i=1;i<es.length;i++){if(es[i].seq===r[r.length-1].seq+1)r.push(es[i]);else{runs.push(r);r=[es[i]];}}runs.push(r);});
  return runs.map(es=>{const f=es[0],l=es[es.length-1];
    const label=es.length===1?f.ref:f.chapter===l.chapter?`${f.book_name} ${f.chapter}:${f.verse}–${l.verse}`
                                                          :`${f.book_name} ${f.chapter}:${f.verse}–${l.chapter}:${l.verse}`;
    return {seq:f.seq,seqFrom:f.seq,seqTo:l.seq,target_id:f.target_id,book:f.book,book_name:f.book_name,chapter:f.chapter,verse:f.verse,
            strength:f.strength,relation:f.relation,
            note:f.note,gloss:f.gloss,asserted_by:f.asserted_by,source:srcFamily(f.asserted_by),md_anchor:f.md_anchor,
            contested:es.some(e=>contestedTarget(p.franklin,e.target_id)),
            parse_conf:es.some(e=>e.parse_conf==='parsed-low')?'parsed-low':'parsed-high',label};});}
// build the ±2-verse passage on demand from the shared verse map (clamped to the book)
function ctxFor(L){const b=BMAP[L.book],out=[];
  for(let s=Math.max(b.start,L.seqFrom-2);s<=Math.min(b.end,L.seqTo+2);s++){const v=D.verses[s];
    if(v)out.push({ref:v.r,text:v.t,target:s>=L.seqFrom&&s<=L.seqTo});}
  return out;}
const vtext=L=>(D.verses[L.seqFrom]||{}).t||'';   // target verse text (for search/snippets)
// "contested": ours and ChatGPT both speak to a (poem, verse) but land on opposite
// sides of the press/decline line (one strong/saturation/plausible/commonplace, the
// other register/set-aside/rejected) — i.e. one presses what the other waves off.
const pressed=t=>tierRank[t]<=3;
const TSRC=new Map();
D.poems.forEach(p=>{const m={};p.edges.forEach(e=>{const fam=srcFamily(e.asserted_by);
  if(fam!=='ours'&&fam!=='chatgpt')return; const cur=(m[e.target_id]=m[e.target_id]||{});
  if(cur[fam]==null||tierRank[e.strength]<tierRank[cur[fam]])cur[fam]=e.strength;});TSRC.set(p.franklin,m);});
function contestedTarget(franklin,tid){const s=(TSRC.get(franklin)||{})[tid];
  return !!(s&&s.ours&&s.chatgpt&&pressed(s.ours)!==pressed(s.chatgpt));}
let CONTESTED_N=0; D.poems.forEach(p=>{const m=TSRC.get(p.franklin)||{};
  for(const tid in m)if(contestedTarget(p.franklin,tid))CONTESTED_N++;});
const POEMLOCI=new Map(); D.poems.forEach(p=>POEMLOCI.set(p.franklin,loci(p)));
const PBYF=new Map(); D.poems.forEach(p=>PBYF.set(p.franklin,p));
function prettyRef(t){const p=t.split('.');const b=BMAP[p[0]]?BMAP[p[0]].name:p[0];return b+' '+p.slice(1).join(':');}
const REF_BOOKS=[...new Set(D.poems.flatMap(p=>p.edges.map(e=>e.book)))].sort((a,b)=>BMAP[a].start-BMAP[b].start);
const poemVis=p=>POEMLOCI.get(p.franklin).filter(L=>tierVisible(L.strength)&&srcVis.has(L.source)&&(!facetBook||L.book===facetBook)&&(!contestedOnly||L.contested));
const yearPass=p=>!facetDecade||(p.year&&Math.floor(p.year/10)*10===facetDecade);
function refBookCentroids(){
  const acc={};
  D.poems.forEach(p=>poemVis(p).forEach(L=>{const a=acc[L.book]||(acc[L.book]={sum:0,n:0,name:L.book_name});a.sum+=L.seq;a.n++;}));
  return Object.entries(acc).map(([key,a])=>({key,name:abbr(a.name),frac:(a.sum/a.n)/TOTAL,seq:Math.round(a.sum/a.n)})).sort((x,y)=>x.frac-y.frac);
}
const ABBR={Genesis:'Gen',Exodus:'Exod',Leviticus:'Lev',Numbers:'Num',Deuteronomy:'Deut',Joshua:'Josh',
  Judges:'Judg',Samuel:'Sam',Kings:'Kgs',Chronicles:'Chr',Nehemiah:'Neh',Esther:'Esth',Psalms:'Ps',
  Proverbs:'Prov',Ecclesiastes:'Eccl',Solomon:'Song',Isaiah:'Isa',Jeremiah:'Jer',Lamentations:'Lam',
  Ezekiel:'Ezek',Daniel:'Dan',Hosea:'Hos',Obadiah:'Obad',Habakkuk:'Hab',Zephaniah:'Zeph',Haggai:'Hag',
  Zechariah:'Zech',Malachi:'Mal',Matthew:'Matt',Romans:'Rom',Corinthians:'Cor',Galatians:'Gal',
  Ephesians:'Eph',Philippians:'Phil',Colossians:'Col',Thessalonians:'Thess',Timothy:'Tim',
  Philemon:'Phlm',Hebrews:'Heb',Revelation:'Rev',Peter:'Pet'};
function abbr(n){const ps=n.split(' '),num=ps.length>1&&/^[123]$/.test(ps[0])?ps[0]:'';const w=ps[ps.length-1];return num+(ABBR[w]||w.slice(0,4));}
function jit(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return ((h>>>0)%1000)/1000-0.5;}

function renderStats(){const s=D.stats;
  const items=[`<b>${s.annotated_poems}</b> poems`,`<b>${s.total_edges.toLocaleString()}</b> references`,
               `<b>${s.kjv_verses.toLocaleString()}</b> KJV verses`,`<b>${s.review_queue.toLocaleString()}</b> in review`];
  document.getElementById('stats').innerHTML=items.join('<span class="dot">·</span>');}

function renderControls(){
  const mk=t=>`<span class="mk">${markSVG(t)}</span>`;
  const bs=D.stats.by_strength, c=document.getElementById('controls');
  c.innerHTML=
   (litKey
     ? `<span class="seg"><button data-lv="poem" class="${litView==='poem'?'active':''}">By poem</button><button data-lv="work" class="${litView==='work'?'active':''}">By work</button></span>`
     : `<span class="seg"><button data-m="poem" class="${mode==='poem'?'active':''}">By poem</button><button data-m="kjv" class="${mode==='kjv'?'active':''}">By scripture</button></span>`)+
   (mode==='kjv'?`<span class="seg"><button data-x="year" class="${xaxis==='year'?'active':''}">Year</button>`+
     `<button data-x="franklin" class="${xaxis==='franklin'?'active':''}">F#</button></span>`:'')+
   `<span class="toggle${visTiers.has('strong')?'':' off'}" data-t="strong">${mk('strong')}strong <b>${bs.strong}</b></span>`+
   `<span class="toggle${visTiers.has('saturation')?'':' off'}" data-t="saturation">${mk('saturation')}saturation <b>${bs.saturation}</b></span>`+
   `<span class="toggle${showPlausible?'':' off'}" data-t="plausible">${mk('plausible')}plausible <b>${bs.plausible}</b></span>`+
   `<span class="toggle${showOther?'':' off'}" data-t="other">${mk('other')}set-aside · register <b>${bs['set-aside']+bs.register+bs.commonplace}</b></span>`+
   `<span class="srcsep"></span>`+
   `<span class="toggle src${srcVis.has('ours')?'':' off'}" data-s="ours">Claude chats <b>${SRC_EDGES.ours}</b></span>`+
   `<span class="toggle src${srcVis.has('chatgpt')?'':' off'}" data-s="chatgpt">ChatGPT chats <b>${SRC_EDGES.chatgpt}</b></span>`+
   `<span class="toggle src${srcVis.has('scholarship')?'':' off'}" data-s="scholarship" title="editorially-identified allusions (e.g. the letters edition's notes; reference works)">Scholarship <b>${SRC_EDGES.scholarship}</b></span>`+
   `<span class="srcsep"></span>`+
   `<select id="fbook" class="facet"><option value="">All books</option>`+
     REF_BOOKS.map(k=>`<option value="${k}"${facetBook===k?' selected':''}>${BMAP[k].name}</option>`).join('')+`</select>`+
   `<select id="fdec" class="facet"><option value="">All years</option>`+
     [1850,1860,1870,1880].map(d=>`<option value="${d}"${facetDecade===d?' selected':''}>${d}s</option>`).join('')+`</select>`+
   (mode==='kjv'?`<span class="toggle${heatOn?'':' off'}" id="heatbtn">▦ heat</span>`:'')+
   `<span class="toggle${contestedOnly?'':' off'}" id="conbtn" title="verses where ours & ChatGPT disagree (one presses, the other waves off)">⚡ contested <b>${CONTESTED_N}</b></span>`+
   `<span class="toggle" id="reachbtn" title="which scripture the poems reach most — the leaderboard, drillable into each verse's poems">✦ most echoed</span>`+
   `<span style="flex:1"></span><input type="search" id="q" value="${query}" placeholder="filter poems / books / verses…">`;
  c.querySelectorAll('.seg button[data-m]').forEach(b=>b.onclick=()=>{mode=b.dataset.m;renderControls();render();scrollTo(0,0);});
  c.querySelectorAll('.seg button[data-lv]').forEach(b=>b.onclick=()=>setLitView(b.dataset.lv));
  c.querySelectorAll('.seg button[data-x]').forEach(b=>b.onclick=()=>{xaxis=b.dataset.x;renderControls();render();});
  c.querySelectorAll('.toggle[data-t]').forEach(t=>t.onclick=()=>{const k=t.dataset.t;
    if(k==='strong'||k==='saturation')visTiers.has(k)?visTiers.delete(k):visTiers.add(k);
    else if(k==='plausible')showPlausible=!showPlausible; else showOther=!showOther;
    t.classList.toggle('off');render();});
  c.querySelectorAll('.toggle[data-s]').forEach(t=>t.onclick=()=>{const s=t.dataset.s;
    srcVis.has(s)?srcVis.delete(s):srcVis.add(s); t.classList.toggle('off');render();});
  document.getElementById('fbook').onchange=e=>{facetBook=e.target.value||null;
    if(mode==='kjv')scope=facetBook?{level:'book',book:facetBook,book_name:BMAP[facetBook].name,chapter:null}:{level:'all',book:null,book_name:null,chapter:null};
    render();};
  document.getElementById('fdec').onchange=e=>{facetDecade=+e.target.value||null;render();};
  const hb=document.getElementById('heatbtn'); if(hb)hb.onclick=()=>{heatOn=!heatOn;hb.classList.toggle('off');render();};
  document.getElementById('conbtn').onclick=()=>{contestedOnly=!contestedOnly;document.getElementById('conbtn').classList.toggle('off');render();};
  document.getElementById('reachbtn').onclick=()=>studyMostReached();
  document.getElementById('q').oninput=e=>{query=e.target.value.toLowerCase();render();};
  document.getElementById('sub').textContent = mode==='kjv'
    ? 'Scripture × time. Vertical = the KJV (Genesis → Revelation); horizontal = when ED wrote; color = the year. A vertical band is one book across her career; hover a dot to light up that poem, click to read both.'
    : 'The poems are the spine, by Franklin number. Each row maps where in the KJV it reaches, Genesis → Revelation.';
}

function render(){
  document.body.className='m-'+mode;
  document.getElementById('rows').innerHTML='';document.getElementById('grid').innerHTML='';
  if(mode==='kjv') renderPlane(); else { renderPoem(); renderRuler(); }
}

/* ---------- BY POEM: name column + inline horizontal KJV spine (virtualized) ---------- */
const ROWH=44; let PS_POEM=[];
function poemRowHTML(p,i){
  const ls=poemVis(p), yr=p.year?(p.year_circa?'c.'+p.year:''+p.year):'—';
  const marks=ls.map(L=>`<div class="mark${L.source==='chatgpt'?' cg':''}${L.contested?' con':''}" id="m_${p.franklin}_${slug(L.label)}" data-f="${p.franklin}" `+
      `data-l="${encodeURIComponent(L.label)}" title="${L.label} — ${L.strength}" style="left:${xpct(L.seq)}%">${markSVG(L.strength)}</div>`).join('');
  return `<div class="poemrow" id="P${p.franklin}" data-f="${p.franklin}" style="top:${i*ROWH}px">`+
    `<div class="prname"><span class="prf">${p.franklin}</span><span class="prfl">${p.first_line}</span><span class="pryr">${yr}</span></div>`+
    `<div class="hspine"><div class="hbase"></div>${marks}</div></div>`;
}
function renderPoem(){
  let ps=D.poems.filter(p=>poemVis(p).length&&yearPass(p));
  if(query)ps=ps.filter(p=>(p.franklin+' '+p.first_line+' '+
     poemVis(p).map(L=>L.label+' '+vtext(L)).join(' ')).toLowerCase().includes(query));
  PS_POEM=ps;
  const grid=document.getElementById('grid');
  const gx=frac=>`calc(var(--specleft) + (100% - var(--specleft) - var(--pad))*${frac})`;
  if(facetBook){   // chapter bands within the drilled book
    const b=BMAP[facetBook], chs=D.kjv_chapters[facetBook]||[];
    chs.forEach(([c,s],i)=>{ if(i%2)return; const nextS=(i+1<chs.length?chs[i+1][1]:b.end+1);
      const l=xpct(s-0.5)/100, r=xpct(nextS-0.5)/100;
      grid.insertAdjacentHTML('beforeend',`<div class="gband" style="left:${gx(l)};width:calc((100% - var(--specleft) - var(--pad))*${r-l})"></div>`);});
  } else {
    BOOKS.forEach((b,i)=>{ if(i%2) return; const l=(b.start-0.5)/TOTAL, r=(b.end+0.5)/TOTAL;
      grid.insertAdjacentHTML('beforeend',`<div class="gband" style="left:${gx(l)};width:calc((100% - var(--specleft) - var(--pad))*${r-l})"></div>`);});
    refBookCentroids().forEach(c=>grid.insertAdjacentHTML('beforeend',`<div class="gline" style="left:${gx(c.frac)}"></div>`));
    if(NT_FIRST)grid.insertAdjacentHTML('beforeend',`<div class="gdiv" style="left:${gx((NT_FIRST.start-0.5)/TOTAL)}"></div>`);
  }
  const rows=document.getElementById('rows');
  rows.style.height=(ps.length*ROWH)+'px';
  if(!ps.length){rows.innerHTML='<div style="padding:40px 30px;color:var(--muted)">No poems match these filters.</div>';return;}
  renderPoemWindow();
}
function renderPoemWindow(){            // render only the rows in (or near) the viewport
  if(mode!=='poem')return;
  const ps=PS_POEM, rows=document.getElementById('rows'); if(!ps.length)return;
  const above=Math.max(0,-rows.getBoundingClientRect().top);
  const start=Math.max(0,Math.floor(above/ROWH)-6);
  const end=Math.min(ps.length,start+Math.ceil(innerHeight/ROWH)+12);
  rows.innerHTML='';

function xNorm(p){if(xaxis==='franklin')return (+p.franklin.slice(1))/FMAX;

}

}

function planeUnits(){
  const all=[]; const q=query;
  D.poems.forEach(p=>{ if(!yearPass(p))return; poemVis(p).forEach(L=>{
    if(scope.level==='book'&&L.book!==scope.book)return;
    if(scope.level==='chapter'&&(L.book!==scope.book||L.chapter!==scope.chapter))return;
    if(q && !(p.franklin+' '+p.first_line).toLowerCase().includes(q) &&
       !(L.label+' '+vtext(L)).toLowerCase().includes(q)) return;
    all.push({L,p});})});
  const groups=new Map(), keyOf=({L})=>scope.level==='all'?L.book:scope.level==='book'?L.chapter:L.verse;
  all.forEach(o=>{const k=keyOf(o);(groups.get(k)||groups.set(k,[]).get(k)).push(o);});
  let units=[...groups.entries()];
  units.sort(scope.level==='all'?(a,b)=>BMAP[a[0]].start-BMAP[b[0]].start:(a,b)=>a[0]-b[0]);
  return units;
}
const DBINS=44;   // fine bins for the density-stream area
function densBins(items){const b=new Array(DBINS).fill(0);
  items.forEach(({p})=>{const xn=xNorm(p); if(xn==null)return; b[Math.min(DBINS-1,Math.max(0,Math.floor(xn*DBINS)))]++;}); return b;}
function streamSVG(b,gmax,gid){const H=100,amp=84,base=H-1;
  // smooth-ish area: a point per bin, mirrored baseline; straight segments read clean at 44 bins
  let d=`M0,${base}`;
  for(let i=0;i<DBINS;i++) d+=` L${(i+0.5).toFixed(2)},${(base-(b[i]/gmax)*amp).toFixed(2)}`;
  d+=` L${DBINS},${base} Z`;
  return `<svg viewBox="0 0 ${DBINS} ${H}" preserveAspectRatio="none" style="position:absolute;inset:0;width:100%;height:100%">`+
    `<defs><linearGradient id="${gid}" x1="0" x2="1" y1="0" y2="0">`+
    `<stop offset="0" stop-color="${eraColor(YMIN)}"/><stop offset=".5" stop-color="${eraColor((YMIN+YMAX)/2)}"/>`+
    `<stop offset="1" stop-color="${eraColor(YMAX)}"/></linearGradient></defs>`+
    `<path d="${d}" fill="url(#${gid})" opacity=".62"/><path d="${d}" fill="none" stroke="${eraColor((YMIN+YMAX)/2)}" stroke-opacity=".5" stroke-width=".5"/></svg>`;}
// the (book,chapter,verse) a lane key represents, for the scripture-study view
function laneScopeArgs(k){
  if(scope.level==='all') return [k, null, null];
  if(scope.level==='book') return [scope.book, +k, null];
  return [scope.book, scope.chapter, +k];
}
function renderPlane(){
  renderLegend(); renderCrumb(); renderTimeRuler(); renderLanesGrid();
  const rows=document.getElementById('lanerows'); rows.innerHTML=''; rows.classList.remove('foc');
  const units=planeUnits();
  // global density max across the dense lanes, so stream heights are comparable book-to-book
  let gmax=1; const UB=new Map();
  if(heatOn) units.forEach(([k,items])=>{ if(items.length>HEAT_MIN){const b=densBins(items);UB.set(k,b);gmax=Math.max(gmax,...b);} });
  units.forEach(([k,items])=>{
    const n=items.length;
    const lab = scope.level==='all' ? {main:BMAP[k].name, drill:true}
              : scope.level==='book' ? {main:'Chapter '+k, drill:true}
              : {main:scope.book_name+' '+scope.chapter+':'+k, drill:false};
    const lane=document.createElement('div'); lane.className='lane';
    lane.innerHTML=`<div class="lanelabel drill" data-k="${k}" title="all echoes of ${lab.main}"><div class="lm">${lab.main}</div>`+
      `<div class="lc">${n} ref${n>1?'s':''}</div></div><div class="lanestrip"></div>`;
    const strip=lane.querySelector('.lanestrip');
    if(heatOn && items.length>HEAT_MIN){            // dense lane -> smooth era-colored density stream
      const bins=UB.get(k);
      strip.innerHTML=streamSVG(bins,gmax,'g'+slug(String(k)))+`<div class="scursor" style="display:none"></div>`;
      const cur=strip.querySelector('.scursor');
      strip.onmousemove=ev=>{const r=strip.getBoundingClientRect();const frac=Math.min(1,Math.max(0,(ev.clientX-r.left)/r.width));
        const bi=Math.min(DBINS-1,Math.floor(frac*DBINS));
        const here=items.filter(({p})=>{const x=xNorm(p);return x!=null&&Math.min(DBINS-1,Math.floor(x*DBINS))===bi;})
          .sort((a,b)=>a.L.seq-b.L.seq);   // scripture order (by verse)
        const val=xaxis==='year'?'c.'+Math.round(YMIN+frac*(YMAX-YMIN)):'F'+Math.round(frac*FMAX);
        const rows=here.map(({L,p})=>`<div class="ti"><b>${L.label}</b> · <i>${p.first_line}</i> <span class="tf">${p.franklin}${L.source==='chatgpt'?' · GPT':''}</span></div>`).join('');
        cur.style.display='block';cur.style.left=(frac*100)+'%';
        showTip(ev,`${lab.main} — ${val} · ${here.length} ref${here.length===1?'':'s'}`,rows||'<div class="tmore">— nothing in this year —</div>');};
      strip.onmouseleave=()=>{cur.style.display='none';hideTip();};
      strip.style.cursor='pointer'; strip.onclick=()=>{if(lab.drill)drill(k);else{clearSel();strip.closest('.lane').classList.add('lanesel');studyScope(...laneScopeArgs(k));}};
    } else {
      items.forEach(({L,p})=>{
        const xn=xNorm(p); if(xn===null)return;
        const left=Math.min(99.5,Math.max(0.5,xn*100+jit(p.franklin)*1.4));
        const top=Math.min(86,Math.max(14,50+jit(p.franklin+L.label)*58));
        const col=eraColor(p.year), yr=p.year?(p.year_circa?'c.'+p.year:''+p.year):'—';
        const el=document.createElement('div'); el.className='pt'+(L.source==='chatgpt'?' cg':'')+(L.contested?' con':'');
        el.id='pt_'+p.franklin+'_'+slug(L.label); el.dataset.f=p.franklin;
        el.style.left=left+'%'; el.style.top=top+'%'; el.innerHTML=markSVG(L.strength,col);
        el.onmouseenter=()=>focusPoem(p.franklin);
        el.onmousemove=ev=>showTip(ev,p.first_line,`${L.label} · ${L.strength} · ${p.franklin} · ${yr}`);
        el.onmouseleave=()=>{clearFocus();hideTip();};
        el.onclick=e=>{e.stopPropagation();studyPoem(p);};
        strip.appendChild(el);});
      strip.style.cursor='pointer'; strip.onclick=()=>{if(lab.drill)drill(k);else{clearSel();strip.closest('.lane').classList.add('lanesel');studyScope(...laneScopeArgs(k));}};
    }
    rows.appendChild(lane);
  });
  rows.querySelectorAll('.lanelabel').forEach(el=>el.onclick=e=>{e.stopPropagation();clearSel();el.closest('.lane').classList.add('lanesel');studyScope(...laneScopeArgs(el.dataset.k));});
  if(!units.length)rows.innerHTML='<div style="padding:40px 26px;color:var(--muted)">No references here at the current filters.</div>';
}

function echoCard(L,franklin){

  let con='';

    con=`<span class="contag">⚡ contested · ours <b>${s.ours||'—'}</b> / ChatGPT <b>${s.chatgpt||'—'}</b></span>`;}
  return `<div class="echo${L.contested?' econ':''}" data-l="${encodeURIComponent(L.label)}"><div class="erow"><span class="drill">drill in →</span>`+
    `<span class="badge" style="background:${markFill(L.strength)}">${L.strength}</span>`+
    `<b class="elink">${L.label}</b>`+(L.relation?`<span class="emuted">${L.relation}</span>`:'')+
    `<span class="srctag">${SRC_LBL[L.source]||L.source}</span>`+con+
    (L.parse_conf==='parsed-low'?`<span class="lowconf">review</span>`:'')+`</div>`+
    `<div class="passage">${tv}</div>`+(L.note?`<div class="enote">${L.note}</div>`:'')+`</div>`;}
function openPoem(p){
  const yr=p.year?(p.year_circa?'c.'+p.year:''+p.year):'—';
  const all=POEMLOCI.get(p.franklin).slice().sort((a,b)=>tierRank[a.strength]-tierRank[b.strength]||a.seq-b.seq);
  // lead with the strongest: show strong+saturation by default; if none, the single top tier present
  let primary=all.filter(L=>L.strength==='strong'||L.strength==='saturation'), rest;
  if(primary.length){rest=all.filter(L=>!(L.strength==='strong'||L.strength==='saturation'));}
  else if(all.length){const top=all[0].strength;primary=all.filter(L=>L.strength===top);rest=all.filter(L=>L.strength!==top);}
  else {primary=[];rest=[];}
  primary.sort((a,b)=>a.seq-b.seq); rest.sort((a,b)=>tierRank[a.strength]-tierRank[b.strength]||a.seq-b.seq);
  const restTiers=[...new Set(rest.map(L=>L.strength))].join(' · ');
  const more = rest.length ? `<div class="moreech" id="moreech">▸ Show ${rest.length} more (${restTiers})</div>`+
    `<div id="restech" style="display:none">${rest.map(L=>echoCard(L,p.franklin)).join('')}</div>` : '';
  document.getElementById('dbody').innerHTML=
    `<h3>${p.first_line}</h3><div class="dpoem">${p.franklin} · ${yr} · ${all.length} scriptural echo${all.length===1?'':'es'}</div>`+
    `<div class="nlabel">The poem</div><div class="poemtext">${p.poem_text||p.first_line}</div>`+
    `<div class="nlabel">KJV echoes</div>${primary.map(L=>echoCard(L,p.franklin)).join('')||'<div class="kv">— none —</div>'}${more}`;
  const wire=el=>el.onclick=()=>openDrawer(POEMLOCI.get(p.franklin).find(x=>x.label===decodeURIComponent(el.dataset.l)),p);
  document.querySelectorAll('#dbody .echo').forEach(wire);
  const m=document.getElementById('moreech'); if(m)m.onclick=()=>{document.getElementById('restech').style.display='block';m.style.display='none';};

}

function studyScope(book,chapter,verse){
  const v0=(verse!=null&&!isNaN(verse))?verse:null;
  const title=BMAP[book].name+(chapter!=null?' '+chapter:'')+(v0!=null?':'+v0:'');
  const ech=gatherEchoes(book, chapter, v0);
  // line-level interlinking: verse -> the readings that echo it
  const vm=new Map();
  ech.forEach(o=>ctxFor(o.L).filter(c=>c.target).forEach(c=>{
    let e=vm.get(c.ref); if(!e){e={ref:c.ref,text:c.text,echoes:[]};vm.set(c.ref,e);} e.echoes.push(o);}));
  const verses=[...vm.values()].sort((a,b)=>vnum(a.ref)-vnum(b.ref));
  const npoems=new Set(ech.map(o=>o.p.franklin)).size;
  const body=verses.map(v=>{
    const byF={};   // one entry per poem per verse (a poem may cite a verse from several sources)
    v.echoes.forEach(o=>{const f=o.p.franklin; if(!byF[f]||tierRank[o.L.strength]<tierRank[byF[f].L.strength])byF[f]=o;});
    const tags=Object.values(byF).sort((a,b)=>(+a.p.franklin.slice(1))-(+b.p.franklin.slice(1)))
      .map(({p,L})=>`<a class="vlink" data-f="${p.franklin}" title="${L.strength}${L.source==='chatgpt'?' · ChatGPT':''}">`+
        `<span class="vd" style="background:${markFill(L.strength)}"></span><span class="vfl">${p.first_line}</span> <span class="vff">${p.franklin}</span></a>`).join('');
    return `<div class="ivs"><div class="pv tgt"><span class="vn">${v.ref.split(' ').pop()}</span>${v.text}</div><div class="vechoes">${tags}</div></div>`;
  }).join('');
  showStudy(`<div class="sbar"><a class="sback" onclick="closeStudy()">← back to the map</a><a class="stoggle" id="ppt">hide poems</a></div>`+
    `<div class="scol"><h2>${title}</h2><div class="smeta">echoed by ${npoems} poem${npoems===1?'':'s'} · ${ech.length} reading${ech.length===1?'':'s'} across ${verses.length} verse${verses.length===1?'':'s'}</div>`+
    `<div class="nlabel">KJV — interlinked line by line</div><div class="passage interlin">${body||'<div class="kv">— none —</div>'}</div></div>`);
  document.querySelectorAll('#study .vlink').forEach(el=>el.onclick=()=>studyPoem(D.poems.find(x=>x.franklin===el.dataset.f)));
  wireScopeToggle();
}
function wireScopeToggle(){
  const t=document.getElementById('ppt'); if(!t)return;
  t.onclick=()=>{const il=document.querySelector('#study .interlin'); if(!il)return;
    const hid=il.classList.toggle('hidep'); t.textContent=hid?'show poems':'hide poems';};
}

function spreadDots(items){    // fan out dots that land on the same spot so none hide
  const g={};
  items.forEach(it=>{const k=Math.round(it.x/7)+'|'+Math.round(it.y/7);(g[k]=g[k]||[]).push(it);});
  Object.values(g).forEach(arr=>{const n=arr.length; if(n<2)return;
    arr.forEach((it,i)=>{it.x+=(i-(n-1)/2)*6.4;});});
  return items;
}
let litKey=null, litView='work', litZoom=null;   // litZoom={lo,hi,label} zooms the x-axis into a sub-range
function openLitSpine(key){ if(!(D.litspines||{})[key])return; closeStudy(); litKey=key; litView='work'; litZoom=null; renderLitSpine(); renderControls(); }
function setLitView(v){ litView=v; renderLitSpine(); renderControls(); }
function spHier(sp){return (sp.sections||[]).some(s=>s.end!=null&&s.end>s.start);}   // PL/plays/odes have nestable sections
function spRange(sp){return litZoom?[litZoom.lo,litZoom.hi]:[1,sp.max];}
function spSectionAt(sp,pos){return (sp.sections||[]).find((s,i)=>{const nx=sp.sections[i+1];
  const hi=s.end!=null?s.end:(nx?nx.start-0.001:sp.max); return pos>=s.start-0.001&&pos<=hi;});}
function posLabel(sp,pos){pos=Math.max(1,pos);
  if(sp.axis==='Book · line'){const s=spSectionAt(sp,pos);return s?`Book ${s.label} · l.${Math.max(1,Math.round(pos-s.start+1))}`:'';}
  if(sp.axis==='Act · scene'){const a=Math.floor(pos),sc=Math.round((pos-a)*10);return `Act ${a}${sc?' · sc.'+sc:''}`;}
  if(sp.axis==='Stanza · line'){return `Stanza ${Math.ceil(pos/10)} · l.${Math.round(pos)}`;}
  if(sp.axis==='Sonnet number')return `Sonnet ${Math.round(pos)}`;
  if(sp.axis==='Canto')return `Canto ${Math.round(pos)}`;
  if(sp.axis==="Christian's journey"){const s=spSectionAt(sp,pos);return s?s.label:'';}
  return `line ${Math.round(pos)}`;}
function spClickAxis(sp,pos){
  if(spHier(sp)&&!litZoom){const s=spSectionAt(sp,pos); if(s){const nx=sp.sections[sp.sections.indexOf(s)+1];
    litZoom={lo:s.start,hi:(s.end!=null?s.end:(nx?nx.start-0.001:sp.max)),label:s.label}; renderLitSpine(); return;}}
  const [lo,hi]=spRange(sp), w=Math.max(0.5,(hi-lo)*0.03);
  studyWorkScope(spineKeyOf(sp),pos-w,pos+w,posLabel(sp,pos));
}
function closeLitSpine(){ const h=document.getElementById('litspine'); if(h)h.classList.remove('open'); hideTip(); if(litKey){litKey=null;renderControls();} }
function renderLitSpine(){
  const sp=(D.litspines||{})[litKey]; if(!sp)return;
  const host=document.getElementById('litspine');
  const structured=!!(sp.sections&&sp.sections.length);   // a real position axis (Acts, books, sonnet #s)
  const title=litZoom?`<a class="spcrumb" onclick="litZoom=null;renderLitSpine();renderControls()">${sp.label}</a> › ${litZoom.label}`:sp.label;
  const sub=!structured
    ? `${(sp.dots.length+sp.unplaced.length)} poems echo it — a single poem, so no internal position; listed by Franklin`
    : litView==='work'
    ? `vertical = when ED wrote · horizontal = ${litZoom?litZoom.label:sp.axis} — hover the axis for the exact spot, click to ${spHier(sp)&&!litZoom?'zoom in':'drill'}`
    : `poems on the left · horizontal = ${litZoom?litZoom.label:sp.axis}`;
  host.innerHTML=`<div class="sphd"><div><b>${title}</b><span class="spsub">${sub}</span></div><a class="spclose" onclick="closeLitSpine()">✕ back to the map</a></div>`+
    (!structured?spineList(sp):litView==='work'?spineWork(sp):spinePoem(sp));

const SPESC=s=>(s||'').replace(/"/g,'&#39;').replace(/</g,'');
function niceStep(x){const p=Math.pow(10,Math.floor(Math.log10(Math.max(x,1)))),f=x/p;return (f<1.5?1:f<3.5?2:f<7.5?5:10)*p;}
function axisLabels(sp){          // orientation labels for the current x-range
  const [lo,hi]=spRange(sp);
  if(spHier(sp)&&!litZoom) return sp.sections.map((s,i)=>{const nx=sp.sections[i+1],e=s.end!=null?s.end:(nx?nx.start:sp.max);return {pos:(s.start+e)/2,label:s.label};});
  const step=niceStep((hi-lo)/7),out=[];
  for(let p=Math.ceil(lo/step)*step;p<=hi+0.001;p+=step){const lp=posLabel(sp,p).replace(/^Sonnet |^Canto |^line /,'').replace(/^Book .* l\./,'l.').replace(/^Act \d+ · /,'');out.push({pos:p,label:lp});}
  return out.length?out:[{pos:(lo+hi)/2,label:posLabel(sp,(lo+hi)/2)}];
}
function spineWork(sp){     // overview scatter — x-axis (the work) along the TOP, year down the side
  const hh=document.querySelector('header').offsetHeight;
  const W=innerWidth<700?innerWidth:Math.max(620,innerWidth), H=Math.max(360,innerHeight-hh-46);
  const fullView=!litZoom, L=54,T=42,B=14, NLW=86;
  const plotR=W-(fullView?NLW+30:24), innerW=plotR-L, innerH=H-T-B, YMIN=1850,YMAX=1887;
  const [rlo,rhi]=spRange(sp);
  const xx=pos=>L+(pos-rlo)/((rhi-rlo)||1)*innerW, yy=y=>T+(Math.min(YMAX,Math.max(YMIN,y||1862))-YMIN)/(YMAX-YMIN)*innerH;
  let years=''; for(let y=1850;y<=1885;y+=5){const yp=yy(y);years+=`<line x1="${L}" y1="${yp}" x2="${W-18}" y2="${yp}" stroke="#f1ece2"/><text x="6" y="${yp+3}" class="ytk" style="text-anchor:start">${y}</text>`;}
  let bands=''; axisLabels(sp).forEach(t=>{const xp=xx(t.pos); if(xp<L-1||xp>plotR+1)return;
    bands+=`<line x1="${xp.toFixed(1)}" y1="${T-8}" x2="${xp.toFixed(1)}" y2="${H-B}" stroke="#ece4d4" stroke-dasharray="2 3"/><text x="${xp.toFixed(1)}" y="${T-12}" class="axl">${t.label}</text>`;});
  const inR=d=>d.pos>=rlo-0.001&&d.pos<=rhi+0.001;
  const placed=spreadDots(sp.dots.filter(inR).map(d=>({x:xx(d.pos),y:yy(d.y),d})));
  let nlpart='',nlcx; if(fullView){nlcx=plotR+18+(NLW-30)/2; const nl=spreadDots(sp.unplaced.map(d=>({x:nlcx,y:yy(d.y),d})));
    nlpart=`<line x1="${plotR+14}" y1="${T-8}" x2="${plotR+14}" y2="${H-B}" stroke="#e6ddcc"/><text x="${nlcx}" y="${T-12}" class="axl axt" data-lo="nl" data-hi="0" data-lab="no locus">no locus</text>`+draw(nl);}
  function draw(a){return a.map(o=>{const d=o.d;return `<circle class="sd" cx="${o.x.toFixed(1)}" cy="${o.y.toFixed(1)}" r="${d.tier==='strong'?5:3.7}" fill="${markFill(d.tier)}" fill-opacity="${d.tier==='set-aside'||d.tier==='register'?0.5:0.82}" data-fr="${d.fr}" data-l="${SPESC(d.l)}" data-w="${SPESC(d.work)}" data-t="${d.tier}"/>`;}).join('');}
  const stripRect=`<rect class="spstrip" x="${L}" y="${T-8}" width="${plotR-L}" height="${(H-B)-(T-8)}" data-l="${L}" data-iw="${innerW}" data-lo="${rlo}" data-hi="${rhi}"/>`;
  const stripGuide=`<line class="spguide" x1="0" y1="${T-8}" x2="0" y2="${H-B}" stroke="#a98fd6" stroke-dasharray="3 3" style="display:none"/><text class="sphov" x="0" y="${T-24}" style="display:none">x</text>`;
  return `<svg width="${W}" height="${H}" class="spsvg"><text x="6" y="16" class="axl" style="text-anchor:start">${litZoom?litZoom.label:sp.axis} →</text>${years}${bands}${nlpart}${stripRect}${draw(placed)}${stripGuide}</svg>`;
}
function spinePoem(sp){     // By-poem style — poems enumerated on the left, the work as the horizontal spine
  const byp=new Map();
  const add=(d,pos)=>{let e=byp.get(d.fr);if(!e){e={fr:d.fr,l:d.l,y:d.y,yc:d.yc,marks:[]};byp.set(d.fr,e);}e.marks.push({pos,tier:d.tier,work:d.work});};
  (sp.dots||[]).forEach(d=>add(d,d.pos)); (sp.unplaced||[]).forEach(d=>add(d,null));
  const poems=[...byp.values()].sort((a,b)=>(+a.fr.slice(1))-(+b.fr.slice(1)));
  const [rlo,rhi]=spRange(sp), fullView=!litZoom;
  const inR=pos=>pos>=rlo-0.001&&pos<=rhi+0.001;
  const visible=poems.filter(p=>p.marks.some(m=>(m.pos==null&&fullView)||(m.pos!=null&&inR(m.pos))));
  const frac=pos=>(pos-rlo)/((rhi-rlo)||1);
  const px=f=>`calc((100% - ${fullView?72:14}px) * ${f.toFixed(4)})`, bx=f=>`calc(var(--prw) + (100% - var(--prw) - ${fullView?72:14}px) * ${f.toFixed(4)})`;
  const NLX='calc(100% - 34px)';
  const labs=axisLabels(sp);
  const ruler=`<div class="wsruler"><div class="wsrname">${litZoom?litZoom.label:sp.axis} →</div><div class="wsaxis">`+
    labs.map(t=>`<span class="wstk axt" data-pos="${t.pos}" style="left:${px(frac(t.pos))}">${t.label}</span>`).join('')+
    (fullView?`<span class="wstk axt" data-lo="nl" data-hi="0" data-lab="no locus" style="left:${NLX}">no&nbsp;loc</span>`:'')+`</div></div>`;
  const grid=labs.map(t=>`<div class="wsband" style="left:${bx(frac(t.pos))}"></div>`).join('')+(fullView?`<div class="wsband nl" style="left:calc(100% - 34px)"></div>`:'');
  const rows=visible.map(p=>{const seen=new Set();
    const marks=p.marks.filter(m=>(m.pos==null&&fullView)||(m.pos!=null&&inR(m.pos))).filter(m=>{const k=m.pos==null?'nl':Math.round(m.pos*10);if(seen.has(k))return false;seen.add(k);return true;})
      .map(m=>`<span class="wsm" style="left:${m.pos==null?NLX:px(frac(m.pos))};background:${markFill(m.tier)}" data-fr="${p.fr}" data-l="${SPESC(p.l)}" data-w="${SPESC(m.work||sp.label)}" data-t="${m.tier}"></span>`).join('');
    const yr=p.y?(p.yc?'c.'+p.y:''+p.y):'—';
    return `<div class="wsrow" data-fr="${p.fr}"><div class="prname"><span class="prf">${p.fr}</span><span class="prfl">${p.l||''}</span><span class="pryr">${yr}</span></div><div class="wsspine"><div class="wsbase"></div>${marks}</div></div>`;}).join('');
  return ruler+`<div class="wsrows">${grid}${rows||'<div class="kv" style="padding:14px">— no poems in this range —</div>'}</div>`;
}
function spineList(sp){     // single-poem works: a Franklin-ordered list of the poems that echo it
  const byp=new Map();
  (sp.dots||[]).concat(sp.unplaced||[]).forEach(d=>{const e=byp.get(d.fr);
    if(!e||tierRank[d.tier]<tierRank[e.tier])byp.set(d.fr,{fr:d.fr,l:d.l,y:d.y,yc:d.yc,tier:d.tier,g:d.g});});
  const poems=[...byp.values()].sort((a,b)=>(+a.fr.slice(1))-(+b.fr.slice(1)));
  const rows=poems.map(p=>{const yr=p.y?(p.yc?'c.'+p.y:''+p.y):'—';
    return `<div class="wsrow lst" data-fr="${p.fr}"><div class="lstname"><span class="tdot" style="background:${markFill(p.tier)}"></span><span class="prf">${p.fr}</span><span class="prfl">${p.l||''}</span><span class="pryr">${yr}</span></div><div class="lstg">${SPESC(p.g)||''}</div></div>`;}).join('');
  return `<div class="wsrows">${rows}</div>`;
}
function axisTicks(sp){     // clickable x-axis units = the distinct loci ED actually reaches
  const numeric = sp.axis==='Sonnet number' || sp.axis==='Canto' || sp.axis==='Line';
  if(numeric){
    const ns=[...new Set(sp.dots.map(d=>Math.round(d.pos)))].sort((a,b)=>a-b);
    return ns.map(n=>({pos:n,label:String(n),lo:n-0.5,hi:n+0.5}));
  }
  return (sp.sections||[]).map((s,i)=>{const nx=sp.sections[i+1];
    return {pos:s.start,label:s.label,lo:s.start-0.001,hi:(s.end!=null?s.end+0.001:(nx?nx.start-0.001:sp.max))};});
}
function studyWorkScope(key,lo,hi,title){     // drill into one locus of a work — its poems + how they echo it
  const sp=(D.litspines||{})[key]; if(!sp)return;
  const ds=(lo==='nl'?sp.unplaced.slice():sp.dots.filter(d=>d.pos>=lo&&d.pos<=hi))
    .sort((a,b)=>tierRank[a.tier]-tierRank[b.tier]||(+a.fr.slice(1))-(+b.fr.slice(1)));
  const seen=new Set();
  const rows=ds.filter(d=>!seen.has(d.fr)&&seen.add(d.fr)).map(d=>{const yr=d.y?(d.yc?'c.'+d.y:''+d.y):'—';
    return `<div class="wsrow lst" data-fr="${d.fr}"><div class="lstname"><span class="tdot" style="background:${markFill(d.tier)}"></span><span class="prf">${d.fr}</span><span class="prfl">${d.l||''}</span><span class="pryr">${yr}</span></div><div class="lstg">${SPESC(d.g)||''}</div></div>`;}).join('');
  showStudy(`<div class="sbar"><a class="sback" onclick="closeStudy()">← back to ${sp.label}</a></div>`+
    `<div class="scol"><h2>${sp.label} <span class="nsub">— ${title}</span></h2>`+
    `<div class="smeta">${seen.size} poem${seen.size===1?'':'s'} reach here</div>`+
    `<div class="nlabel">the poems & how each echoes it</div><div class="wsrows">${rows||'<div class="kv">— none —</div>'}</div></div>`);
  document.querySelectorAll('#study .wsrow').forEach(r=>r.onclick=()=>{const q=PBYF.get(r.dataset.fr);if(q)studyPoem(q);else openCorpusPoem(r.dataset.fr);});
}

    c.onmouseleave=hideTip; c.onclick=e=>{e.stopPropagation();go(c.dataset.fr);};});

  }

function concordanceHTML(word){
  const stem=word.replace(/[^a-z0-9]/gi,'');
  if(stem.length<2)return '';
  let re; try{re=new RegExp("\\b("+stem+"(?:e?s|'s|es|ed|ing|y|ies)?)\\b","i");}catch(e){return '';}
  const hits=[];
  (D.lex_corpus||[]).forEach(p=>{
    const ls=[]; p.t.split('\n').forEach(ln=>{ if(re.test(ln)) ls.push(ln.replace(new RegExp(re,'ig'),'<mark>$1</mark>')); });
    if(ls.length) hits.push({f:p.f,l:p.l,lines:ls});
  });
  hits.sort((a,b)=>(+a.f.slice(1))-(+b.f.slice(1)));
  if(!hits.length)return `<div class="kv">— no use of “${word}” found —</div>`;
  const poems=hits.filter(h=>h.f[0]==='F'), letts=hits.filter(h=>h.f[0]==='L');
  const uses=hits.reduce((n,h)=>n+h.lines.length,0);
  const row=h=>`<div class="conc"><a class="conctitle" data-f="${h.f}"><span class="vfl">${h.l}</span> <span class="vff">${h.f}</span></a>`+
    h.lines.map(x=>`<div class="concline">${x}</div>`).join('')+`</div>`;
  let out=`<div class="nlabel" style="margin-top:10px">“${word}” <span class="nsub">— ${uses} use${uses===1?'':'s'} in ${poems.length} poem${poems.length===1?'':'s'}${letts.length?` &amp; ${letts.length} letter${letts.length===1?'':'s'}`:''}</span></div>`;
  out+=`<div class="conclist">${poems.map(row).join('')}</div>`;
  if(letts.length)out+=`<div class="nlabel" style="margin-top:8px">In the letters <span class="nsub">— ${letts.length}</span></div><div class="conclist">${letts.map(row).join('')}</div>`;
  return out;
}
function openCorpusPoem(fr){ const p=PBYF.get(fr); if(p){studyPoem(p);return;}
  const c=LEXBYF.get(fr); if(!c)return;
  const isL=c.f[0]==='L';
  showStudy(`<div class="sbar"><a class="sback" onclick="studyLexicon()">← back to the lexical field</a></div>`+
    `<div class="scol"><h2>${c.l}</h2><div class="smeta">${c.f}${isL?(c.y?' · '+c.y:'')+' · letter':' · not yet annotated for echoes'}</div>`+
    `<div class="nlabel">${isL?'The letter':'The poem'}</div><div class="poemtext big">${c.t.replace(/\n/g,'<br>')}</div></div>`);
}
function studyAuthorSpine(author){
  const byWork=new Map();
  D.poems.forEach(p=>(p.literary||[]).forEach(L=>{ if(L.author!==author)return;
    const w=L.work||'(unspecified work)';
    (byWork.get(w)||byWork.set(w,[]).get(w)).push({p,L}); }));
  const works=[...byWork.entries()].sort((a,b)=>b[1].length-a[1].length);
  const npoems=new Set(works.flatMap(([,arr])=>arr.map(x=>x.p.franklin))).size;
  const body=works.map(([w,arr])=>{
    const byF={};   // one entry per poem per work
    arr.forEach(o=>{const f=o.p.franklin; if(!byF[f]||tierRank[o.L.strength]<tierRank[byF[f].L.strength])byF[f]=o;});
    const ded=Object.values(byF).sort((a,b)=>(+a.p.franklin.slice(1))-(+b.p.franklin.slice(1)));
    const tags=ded.map(({p,L})=>`<a class="vlink" data-f="${p.franklin}" title="${L.strength}${L.locus?' · '+L.locus:''}">`+
      `<span class="vd" style="background:${markFill(L.strength)}"></span><span class="vfl">${p.first_line}</span> <span class="vff">${p.franklin}</span></a>`).join('');
    return `<div class="ivs"><div class="pv tgt"><span class="wtitle">${w}</span> <span class="wn">${ded.length}</span></div><div class="vechoes">${tags}</div></div>`;
  }).join('');
  showStudy(`<div class="sbar"><a class="sback" onclick="closeStudy()">← back to the map</a><a class="stoggle" id="ppt">hide poems</a></div>`+
    `<div class="scol"><h2>${author}</h2><div class="smeta">${works.length} work${works.length===1?'':'s'} echoed by ${npoems} poem${npoems===1?'':'s'} — a literary spine, parallel to scripture</div>`+
    `<div class="nlabel">Works — and the poems that reach them</div><div class="passage interlin">${body||'<div class="kv">— none —</div>'}</div></div>`);
  document.querySelectorAll('#study .vlink').forEach(el=>el.onclick=()=>{const q=PBYF.get(el.dataset.f);if(q)studyPoem(q);});
  wireScopeToggle();
}
function studyMostReached(){
  const mr=D.most_reached; if(!mr)return;
  const bar=(n,max)=>`<span class="mbar" style="width:${Math.max(3,100*n/max)}%"></span>`;
  function section(title,sub,items,onclickAttr){
    const max=items[0]?items[0].poems:1;
    const rows=items.map(it=>`<div class="mrow" ${onclickAttr(it)}><span class="mlbl">${it.key}</span>`+
      `<span class="mtrack">${bar(it.poems,max)}</span><span class="mn">${it.poems}</span></div>`).join('');
    return `<div class="nlabel">${title} <span class="nsub">— ${sub}</span></div><div class="mr">${rows}</div>`;
  }
  // book key + chapter/verse parsing back out of the display labels, for studyScope drill
  const bk=name=>NAME2KEY.get(name)||name;
  const bookClick =it=>`data-sb="${bk(it.key)}"`;
  const chapClick =it=>{const m=it.key.match(/^(.*)\s+(\d+)$/);return m?`data-sb="${bk(m[1])}" data-sc="${m[2]}"`:'';};
  const verseClick=it=>{const m=it.key.match(/^(.*)\s+(\d+):(\d+)$/);return m?`data-sb="${bk(m[1])}" data-sc="${m[2]}" data-sv="${m[3]}"`:'';};
  const al=D.most_alluded, none=()=>"";
  const auClick=it=>`data-au="${it.key.replace(/"/g,'&#39;')}"`;
  const litsec = al ? (section('Literary authors','most-alluded writers — click to open the author','authors' in al?al.authors:[],auClick)+
                       section('Literary works','most-alluded works',al.works,none)) : "";
  showStudy(`<div class="sbar"><a class="sback" onclick="closeStudy()">← back to the map</a></div>`+
    `<div class="scol"><h2>Most echoed &amp; alluded</h2>`+
    `<div class="smeta">where the poems reach most often — by how many distinct poems touch each locus. Click a scripture line to read its poems.</div>`+
    section('Books','Genesis → Revelation',mr.books,bookClick)+
    section('Chapters','single chapters',mr.chapters,chapClick)+
    section('Verses','single verses',mr.verses,verseClick)+
    litsec+`</div>`);
  document.querySelectorAll('#study .mrow').forEach(el=>{ if(!el.dataset.sb)return; el.style.cursor='pointer';
    el.onclick=()=>studyScope(el.dataset.sb, el.dataset.sc?+el.dataset.sc:null, el.dataset.sv?+el.dataset.sv:null);});
  document.querySelectorAll('#study .mrow[data-au]').forEach(el=>{el.style.cursor='pointer';
    el.onclick=()=>studyAuthorSpine(el.dataset.au);});
}

function openDrawer(L,p){
  const yr=p.year?(p.year_circa?'c.'+p.year:''+p.year):'—';
  const passage=ctxFor(L).map(c=>`<div class="pv${c.target?' tgt':''}"><span class="vn">${c.ref.split(' ').pop()}</span>${c.text}</div>`).join('');
  const others=POEMLOCI.get(p.franklin).filter(L2=>L2.label!==L.label)
    .map(L2=>`<a onclick="navOther('${p.franklin}','${L2.book}',decodeURIComponent('${encodeURIComponent(L2.label)}'))">${L2.label}</a>`).join('')
    ||'<span style="color:var(--muted)">— none —</span>';
  document.getElementById('dbody').innerHTML=
    `<div class="backlink" onclick="openPoemF('${p.franklin}')">← ${p.franklin} · all echoes</div>`+
    `<h3>${L.label}</h3>`+
    `<span class="badge" style="background:${markFill(L.strength)}">${L.strength}</span>`+
    (L.relation?` <span class="badge" style="background:#6b6257">${L.relation}</span>`:'')+
    (L.parse_conf==='parsed-low'?` <span class="lowconf" style="margin-left:6px">tier defaulted — review</span>`:'')+
    `<div class="nlabel">KJV — passage in context</div><div class="passage">${passage}</div>`+
    `<div class="nlabel">Emily Dickinson — ${p.franklin} · ${yr}</div><div class="poemtext">${p.poem_text||p.first_line}</div>`+
    (L.note?`<div class="nlabel">Why this echo fits</div><div class="note">${L.note}</div>`:'')+
    `<div class="nlabel">This poem also reaches into</div><div class="other">${others}</div>`+
    `<div class="kv">Asserted by <b>${L.asserted_by||p.franklin}</b>`+
    (L.md_anchor?` · <a class="anchor" href="obsidian://open?file=${encodeURIComponent(L.md_anchor)}">↗ annotation</a>`:'')+`</div>`;
  document.getElementById('drawer').classList.add('open');document.getElementById('scrim').classList.add('open');
}
function navOther(franklin,book,label){
  const id=(mode==='poem'?'m_':'pt_')+franklin+'_'+slug(label);const el=document.getElementById(id);if(!el)return;
  if(mode==='poem'){closeDrawer();(el.closest('.poemrow')||el).scrollIntoView({behavior:'smooth',block:'center'});}
  el.classList.add('flash');setTimeout(()=>el.classList.remove('flash'),1500);}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('scrim').classList.remove('open');}
addEventListener('keydown',e=>{if(e.key==='Escape')closeDrawer();});
addEventListener('resize',()=>{if(mode==='kjv')renderPlane();else renderPoemWindow();});

renderStats();renderControls();renderSpines();
// keep --hh (the fixed-plane top offset) locked to the real header height at all times
const _hdr=document.querySelector('header');
const setHH=()=>document.documentElement.style.setProperty('--hh',_hdr.offsetHeight+'px');
try{new ResizeObserver(setHH).observe(_hdr);}catch(e){} setHH();
addEventListener('load',()=>{setHH();
  const u=new URLSearchParams(location.search), bk=u.get('book');
  if(bk&&BMAP[bk])scope={level:u.get('chapter')?'chapter':'book',book:bk,book_name:BMAP[bk].name,chapter:u.get('chapter')?+u.get('chapter'):null};
  if(u.get('fbook')&&BMAP[u.get('fbook')])facetBook=u.get('fbook');
  if(u.get('fdec'))facetDecade=+u.get('fdec')||null;
  if(u.get('contested'))contestedOnly=true;
  if(facetBook&&mode==='kjv'&&scope.level==='all')scope={level:'book',book:facetBook,book_name:BMAP[facetBook].name,chapter:null};
  if(facetBook||facetDecade)renderControls();
  render();
  const pf=u.get('poem'); if(pf){const p=D.poems.find(x=>x.franklin===pf); if(p)studyPoem(p);}
  const st=u.get('study'); if(st){const[b,c,v]=st.split('.'); if(BMAP[b])studyScope(b,c?+c:null,v?+v:null);}
  if(u.get('reach'))studyMostReached();
  if(u.get('word'))studyLexicon(u.get('word')); else if(u.get('lex'))studyLexicon();
  if(u.get('spine')){openLitSpine(u.get('spine')); if(u.get('sv')==='poem')setLitView('poem');}});
addEventListener('keydown',e=>{if(e.key==='Escape')closeLitSpine();});
render();
</script>

<div id="pwgate" style="position:fixed;inset:0;z-index:9999;background:#fbfaf7;display:flex;align-items:center;justify-content:center;font-family:Georgia,'Times New Roman',serif">
  <form id="pwform" style="text-align:center;max-width:340px;padding:24px">
    <div style="font:500 24px/1.15 Georgia,serif;color:#211c16">Emily Dickinson</div>
    <div style="font-style:italic;color:#857a6c;margin:4px 0 20px">mapping the echoes in Dickinson's writing</div>
    <input id="pwin" type="password" placeholder="password" autofocus autocomplete="current-password"
      style="font:14px Georgia,serif;padding:9px 12px;width:100%;border:1px solid #d8d2c6;border-radius:8px;text-align:center;background:#fff">
    <button type="submit" style="font:13px Georgia,serif;margin-top:11px;padding:8px 22px;border:0;border-radius:8px;background:#5a4a8a;color:#fff;cursor:pointer">Enter</button>
    <div id="pwerr" style="color:#a3302a;font-size:12.5px;margin-top:10px;height:14px"></div>
  </form>
</div>
<script>
(function(){
  var g=document.getElementById('pwgate'),f=document.getElementById('pwform'),inp=document.getElementById('pwin'),er=document.getElementById('pwerr');
  var b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
  function boot(){ g.remove();
    var s=document.createElement('script'); s.textContent=document.getElementById('app').textContent;
    document.body.appendChild(s); window.dispatchEvent(new Event('load')); }
  async function go(pw){
    var enc=await (await fetch('data.enc?v=53e9e97aad',{cache:'force-cache'})).json();
    var base=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
    var key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(enc.s),iterations:enc.n,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['decrypt']);
    var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(enc.i)},key,b64(enc.c));
    var txt=await new Response(new Blob([pt]).stream().pipeThrough(new DecompressionStream('gzip'))).text();
    window.ED_DATA=JSON.parse(txt);
    try{sessionStorage.setItem('ed_pw',pw);}catch(e){}
    boot();
  }
  f.onsubmit=function(e){e.preventDefault();er.textContent='';go(inp.value).catch(function(){er.textContent='Incorrect password.';});};
  var saved; try{saved=sessionStorage.getItem('ed_pw');}catch(e){}
  if(saved) go(saved).catch(function(){});
})();
</script>
